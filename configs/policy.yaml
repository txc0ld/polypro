mode: live_tiny

market_filters:
  # Scalp / day-trade doctrine: same-day to 72h horizon, $250k+ volume,
  # $100k+ liquidity, ≤3c spread, 20c-80c price zone. Anything outside
  # this filter is not a day-trade candidate.
  min_liquidity_usd: 100000
  min_volume_24h_usd: 250000
  max_spread_pct: 3
  min_depth_within_5c_usd: 10000
  min_time_to_close_minutes: 5
  max_time_to_close_minutes: 4320  # 72h
  # New price-zone gate: skip markets priced outside this band — the bot
  # cannot realistically scalp markets already at 95%+ certainty.
  min_mid_price: 0.20
  max_mid_price: 0.80

risk:
  bankroll_usdc: 39
  # Operator absolute cap: $3 per order. The user's intent is "smallest
  # possible live trades." Polymarket's venue minimum is 5 outcome shares;
  # at a typical $0.40-0.60 mid that's ~$2.00-$3.00 USDC. Setting the cap
  # to $3 means the formatter will floor every order to the venue minimum.
  # Anything smaller gets SIZE_BELOW_MIN_ORDER_SIZE rejected.
  max_order_usdc: 3.0
  max_single_market_position_pct: 8
  max_single_event_exposure_pct: 15
  max_category_exposure_pct: 25
  # Daily loss kill at ~$7.80 of $39 bankroll = ~2 fully-losing $3 orders.
  # Tight but appropriate for a first live test on a small bankroll.
  max_daily_loss_pct: 20
  max_weekly_loss_pct: 30
  max_open_markets: 10
  max_orders_per_minute: 10

kelly:
  fraction: 0.05
  min_effective_edge: 0.03
  max_model_uncertainty: 0.12

orders:
  allowed_types_live_tiny:
    - GTC
    - FAK
  allow_market_orders: false
  require_tick_size: true
  require_fee_rate: true
  require_min_order_size: true

integrity:
  ban_private_information: true
  ban_leaked_information: true
  ban_outcome_influencer_trading: true
  ban_spoofing: true
  ban_wash_trading: true
  ban_self_dealing: true
  ban_manipulation: true

subagents:
  market_divergence_monitor_seconds: 60
  news_context_monitor_seconds: 60
  portfolio_sentinel_seconds: 30
  market_scanner_minutes: 5
  reference_repo_monitor_seconds: 3600
  strategy_automation_seconds: 30
  trade_activity_seconds: 60

automation:
  enabled: true
  allow_order_placement: true
  max_markets_per_strategy_cycle: 12
  external_anchors_path: configs/external_anchors.json
  news_max_items_per_feed: 20
  news_rss_urls:
    - https://www.reutersagency.com/feed/?best-topics=political-general&post_type=best
    - https://www.espn.com/espn/rss/news
    - https://www.coindesk.com/arc/outboundfeeds/rss/
    - https://feeds.bbci.co.uk/news/world/rss.xml
  require_pinned_commits: true
  sources:
    - name: poly_data
      repo_url: https://github.com/warproxxx/poly_data
      purpose: Historical trade data for backtesting and wallet replay.
      integration_mode: historical_backtest_data
      pinned_commit: b7c1d1703d6a3d1dfaa5f49c9ef7b4b899775392
      expected_path: external/poly_data
      local_path_env: POLYFLOW_POLY_DATA_PATH
      required_files:
        - update_all.py
        - update_utils/process_live.py
        - poly_utils/utils.py
    - name: polymarket-cli
      repo_url: https://github.com/Polymarket/polymarket-cli
      purpose: Official command surface for market scanning, order inspection, and guarded order workflows.
      integration_mode: external_cli_surface
      pinned_commit: 4b5a749d5bf04f23611544a059e2a15c7281ae83
      expected_path: external/polymarket-cli
      local_path_env: POLYFLOW_POLYMARKET_CLI_PATH
      required_files:
        - Cargo.toml
        - src/commands/clob.rs
        - src/commands/markets.rs
      commands:
        - polymarket
    - name: polymarket-agents
      repo_url: https://github.com/Polymarket/agents
      purpose: Agent/RAG framework reference for public-source reasoning and LLM tool contracts.
      integration_mode: agent_framework_reference
      pinned_commit: 081f2b5594c37edeb9d3780a778c084d5b6f2743
      expected_path: external/agents
      local_path_env: POLYFLOW_POLYMARKET_AGENTS_PATH
      required_files:
        - agents/application/trade.py
        - agents/polymarket/gamma.py
        - agents/utils/objects.py
    - name: polymarket-trade-engine
      repo_url: https://github.com/KaustubhPatange/polymarket-trade-engine
      purpose: 5-minute market engine architecture reference for lifecycle, ticker, and simulation patterns.
      integration_mode: five_minute_engine_reference
      pinned_commit: b941451fb2a65cfc721c73bdc92e0a3e4b7c9a4f
      expected_path: external/polymarket-trade-engine
      local_path_env: POLYFLOW_TRADE_ENGINE_PATH
      required_files:
        - engine/market-lifecycle.ts
        - engine/strategy/simulation.ts
        - tracker/orderbook.ts
