# Macro events calendar — operator-curated.
#
# Per the EV-harvester protocol: do not pre-position blindly. Use this
# calendar to drive pre/post-release windows. Strategies can refuse to
# trade in the pre-release blackout (default 30min) and rate-limit during
# the post-release reaction window (default 5min).
#
# Supported `kind` values:
#   FOMC              FOMC rate decision
#   FOMC_MINUTES      FOMC minutes release
#   CPI               US Consumer Price Index
#   PCE               Personal Consumption Expenditures
#   NFP               Non-Farm Payrolls
#   EIA_PETROLEUM     EIA weekly oil inventory
#   TREASURY_AUCTION  US Treasury auction
#
# All timestamps are UTC. Update this file weekly with the next set of
# scheduled releases. Example placeholder entries below — replace with
# real upcoming release times before relying on the windows.

events: []

